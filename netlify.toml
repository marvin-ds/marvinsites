[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect www → apex (cobre http e https em um único salto)
[[redirects]]
  from  = "https://www.marvinsites.com.br/*"
  to    = "https://marvinsites.com.br/:splat"
  status = 301
  force  = true

[[redirects]]
  from  = "http://www.marvinsites.com.br/*"
  to    = "https://marvinsites.com.br/:splat"
  status = 301
  force  = true

[[redirects]]
  from  = "http://marvinsites.com.br/*"
  to    = "https://marvinsites.com.br/:splat"
  status = 301
  force  = true

# Cache agressivo — assets com hash do Astro
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers de segurança globais
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "SAMEORIGIN"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://analytics.umami.is https://api.resend.com; frame-ancestors 'self';"
