<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo azul petróleo com borda arredondada -->
  <rect width="100" height="100" rx="18" fill="#0B1F33"/>

  <!-- Borda interna (efeito outline do logo) -->
  <rect x="8" y="8" width="84" height="84" rx="13" fill="none" stroke="white" stroke-width="4"/>

  <!-- Três pontos superiores -->
  <circle cx="22" cy="24" r="3.5" fill="white"/>
  <circle cx="33" cy="24" r="3.5" fill="white"/>
  <circle cx="44" cy="24" r="3.5" fill="white"/>

  <!-- Letra M branca -->
  <path d="M18 75 L18 38 L35 62 L50 38 L50 75" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Cursor laranja (canto inferior direito do M) -->
  <polygon points="50,62 72,75 64,68 70,55" fill="#FF6B2C"/>
  <!-- Efeito sticker/dobra do cursor -->
  <polygon points="64,68 70,55 72,75" fill="#C2410C"/>
</svg>
